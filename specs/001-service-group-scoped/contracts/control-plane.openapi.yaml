openapi: 3.1.0
info:
  title: Atlas Control Plane API
  version: 2026-02-14
  description: >
    Control Plane API for Service Group-scoped lifecycle analysis, recommendation
    governance, and human-gated action workflows. Backend orchestration uses
    native MCP discovery/invocation in Microsoft Agent Framework and Foundry agents.
x-platform-constraints:
  foundry:
    experience: new
    agentSetup: standard
    deploymentPath: bicep-programmatic
    notes:
      - private-link-supported
      - new-portal-end-to-end-isolation-limitations-acknowledged
      - use-programmatic-network-secured-setup-where-required
  networkSecurityPerimeter:
    required: true
    rolloutMode:
      - learning
      - enforced
    evidenceLogTable: NSPAccessLogs
    enforcementGate: required-before-production-enforced-cutover
  mcp:
    requiredServers:
      - azure-mcp-server
      - microsoft-learn-mcp-server
    invocationMode: native-tool-discovery-and-invocation
    customWrappers:
      defaultPolicy: disallowed
      exceptionProcess: documented-capability-gap-plus-architecture-approval
    authentication:
      azureMcp: managed-identity-plus-rbac
      microsoftLearnMcp: approved-read-only-retrieval
    networking:
      publicEndpointsRequired: true
      outboundControls:
        - fqdn-allowlist
        - tls
        - auditable-tool-call-telemetry
      inboundPublicAccessToPrivateBackends: prohibited
x-delivery-policy:
  environmentModel: single-prod
  realIntegrationOnly: true
  mockPolicy: unit-component-only
servers:
  - url: https://api.atlas.example.com
security:
  - bearerAuth: []
paths:
  /api/service-groups:
    get:
      operationId: listServiceGroups
      summary: List accessible service groups
      x-required-roles:
        - ServiceGroup.Reader
      parameters:
        - $ref: '#/components/parameters/ApiVersion'
      responses:
        '200':
          description: Service groups for the current principal
          content:
            application/json:
              schema:
                type: object
                required: [value]
                properties:
                  value:
                    type: array
                    items:
                      $ref: '#/components/schemas/ServiceGroup'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/service-groups/{serviceGroupId}/analyses:
    post:
      operationId: startAnalysis
      summary: Start a Service Group analysis run
      x-required-roles:
        - Analysis.Runner
      parameters:
        - $ref: '#/components/parameters/ApiVersion'
        - $ref: '#/components/parameters/ServiceGroupId'
        - $ref: '#/components/parameters/RepeatabilityRequestId'
        - $ref: '#/components/parameters/RepeatabilityFirstSent'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartAnalysisRequest'
      responses:
        '202':
          description: Analysis accepted
          headers:
            operation-location:
              description: Absolute URL to analysis status
              schema:
                type: string
                format: uri
            x-correlation-id:
              description: Correlation ID for the analysis workflow
              schema:
                type: string
                format: uuid
            repeatability-result:
              $ref: '#/components/headers/RepeatabilityResult'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalysisAccepted'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/analyses/{analysisId}:
    get:
      operationId: getAnalysisStatus
      summary: Get analysis workflow status and score summary
      x-required-roles:
        - Analysis.Reader
      parameters:
        - $ref: '#/components/parameters/ApiVersion'
        - $ref: '#/components/parameters/AnalysisId'
      responses:
        '200':
          description: Analysis details
          headers:
            Retry-After:
              $ref: '#/components/headers/RetryAfter'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalysisStatus'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/operations/{operationId}:
    get:
      operationId: getOperationStatus
      summary: Poll operation status for long-running workflow actions
      x-required-roles:
        - Analysis.Reader
      parameters:
        - $ref: '#/components/parameters/ApiVersion'
        - $ref: '#/components/parameters/OperationId'
      responses:
        '200':
          description: Operation status
          headers:
            Retry-After:
              $ref: '#/components/headers/RetryAfter'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperationStatus'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/recommendations/{recommendationId}:
    get:
      operationId: getRecommendation
      summary: Get recommendation details, evidence, confidence, and trade-offs
      x-required-roles:
        - Recommendation.Reader
      parameters:
        - $ref: '#/components/parameters/ApiVersion'
        - $ref: '#/components/parameters/RecommendationId'
      responses:
        '200':
          description: Recommendation details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Recommendation'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/recommendations/{recommendationId}/decisions:
    post:
      operationId: submitRecommendationDecision
      summary: Submit human decision for a recommendation
      x-required-roles:
        - Recommendation.Approver
      parameters:
        - $ref: '#/components/parameters/ApiVersion'
        - $ref: '#/components/parameters/RecommendationId'
        - $ref: '#/components/parameters/RepeatabilityRequestId'
        - $ref: '#/components/parameters/RepeatabilityFirstSent'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecommendationDecisionRequest'
      responses:
        '200':
          description: Decision recorded
          headers:
            repeatability-result:
              $ref: '#/components/headers/RepeatabilityResult'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecommendationDecision'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/recommendations/{recommendationId}/actions/pr-preview:
    post:
      operationId: generateIacPreview
      summary: Generate PR-ready IaC preview and rollback plan for an approved recommendation
      x-required-roles:
        - Action.Generator
      parameters:
        - $ref: '#/components/parameters/ApiVersion'
        - $ref: '#/components/parameters/RecommendationId'
        - $ref: '#/components/parameters/RepeatabilityRequestId'
        - $ref: '#/components/parameters/RepeatabilityFirstSent'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActionPreviewRequest'
      responses:
        '202':
          description: IaC artifact generation accepted
          headers:
            operation-location:
              description: Absolute URL to preview generation status
              schema:
                type: string
                format: uri
            repeatability-result:
              $ref: '#/components/headers/RepeatabilityResult'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionPreviewAccepted'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          description: Recommendation is not in approved state
          headers:
            x-error-code:
              $ref: '#/components/headers/XErrorCode'
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'

  /api/service-groups/{serviceGroupId}/timeline:
    get:
      operationId: getServiceGroupTimeline
      summary: Get past/present/projected architecture evolution events
      x-required-roles:
        - Timeline.Reader
      parameters:
        - $ref: '#/components/parameters/ApiVersion'
        - $ref: '#/components/parameters/ServiceGroupId'
      responses:
        '200':
          description: Timeline events
          content:
            application/json:
              schema:
                type: object
                required: [value]
                properties:
                  value:
                    type: array
                    items:
                      $ref: '#/components/schemas/TimelineEvent'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  parameters:
    ApiVersion:
      name: api-version
      in: query
      required: true
      schema:
        type: string
        pattern: '^\d{4}-\d{2}-\d{2}(-preview)?$'
      description: API version in YYYY-MM-DD or YYYY-MM-DD-preview format.
    ServiceGroupId:
      name: serviceGroupId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    AnalysisId:
      name: analysisId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    RecommendationId:
      name: recommendationId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    OperationId:
      name: operationId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    RepeatabilityRequestId:
      name: Repeatability-Request-ID
      in: header
      required: false
      schema:
        type: string
        format: uuid
      description: Client-provided idempotency key for mutating requests.
    RepeatabilityFirstSent:
      name: Repeatability-First-Sent
      in: header
      required: false
      schema:
        type: string
        format: date-time
      description: Timestamp of first request submission for repeatability handling.

  headers:
    XErrorCode:
      description: Stable machine-readable error code.
      schema:
        type: string
    RetryAfter:
      description: Polling backoff in integer seconds; present when operation is non-terminal.
      schema:
        type: integer
        minimum: 1
    RepeatabilityResult:
      description: Indicates whether the request was freshly accepted or replayed from prior idempotent submission.
      schema:
        type: string
        enum: [accepted, replayed]

  responses:
    BadRequest:
      description: Bad request
      headers:
        x-error-code:
          $ref: '#/components/headers/XErrorCode'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    Unauthorized:
      description: Unauthorized
      headers:
        x-error-code:
          $ref: '#/components/headers/XErrorCode'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    Forbidden:
      description: Forbidden
      headers:
        x-error-code:
          $ref: '#/components/headers/XErrorCode'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    NotFound:
      description: Not found
      headers:
        x-error-code:
          $ref: '#/components/headers/XErrorCode'
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ServiceGroup:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        subscriptions:
          type: array
          items:
            type: string

    StartAnalysisRequest:
      type: object
      properties:
        reason:
          type: string
        includeDebate:
          type: boolean
          default: false

    AnalysisAccepted:
      type: object
      required: [analysisId, correlationId, status]
      properties:
        analysisId:
          type: string
          format: uuid
        correlationId:
          type: string
          format: uuid
        status:
          type: string
          enum: [queued]

    AnalysisStatus:
      type: object
      required: [analysisId, serviceGroupId, status, scores]
      properties:
        analysisId:
          type: string
          format: uuid
        serviceGroupId:
          type: string
          format: uuid
        status:
          type: string
          enum: [queued, running, completed, partial, failed, cancelled]
        scores:
          type: object
          properties:
            costEfficiency:
              type: number
              minimum: 0
              maximum: 100
            reliability:
              type: number
              minimum: 0
              maximum: 100
            architectureMaturity:
              type: number
              minimum: 0
              maximum: 100
            sustainability:
              type: number
              minimum: 0
              maximum: 100
        confidence:
          type: number
          minimum: 0
          maximum: 1

    Recommendation:
      type: object
      required:
        - id
        - analysisId
        - title
        - confidence
        - risk
        - tradeoffs
        - impactedServices
        - status
      properties:
        id:
          type: string
          format: uuid
        analysisId:
          type: string
          format: uuid
        title:
          type: string
        summary:
          type: string
        confidence:
          type: number
          minimum: 0
          maximum: 1
        risk:
          type: object
          additionalProperties: true
        tradeoffs:
          type: object
          additionalProperties: true
        impactedServices:
          type: array
          items:
            type: string
        evidence:
          type: array
          items:
            type: string
            format: uri
        status:
          type: string
          enum: [draft, pending_approval, approved, modified, deferred, escalated, rejected]

    RecommendationDecisionRequest:
      type: object
      required: [decision]
      properties:
        decision:
          type: string
          enum: [approve, modify, defer, escalate, reject]
        notes:
          type: string
        overridePayload:
          type: object
          additionalProperties: true

    RecommendationDecision:
      type: object
      required: [recommendationId, decision, decidedAt, decidedBy]
      properties:
        recommendationId:
          type: string
          format: uuid
        decision:
          type: string
          enum: [approve, modify, defer, escalate, reject]
        decidedBy:
          type: string
        decidedAt:
          type: string
          format: date-time

    ActionPreviewRequest:
      type: object
      properties:
        targetFormat:
          type: string
          enum: [terraform, bicep, mixed]
        includeRollbackSimulation:
          type: boolean
          default: true

    ActionPreviewAccepted:
      type: object
      required: [operationId, status]
      properties:
        operationId:
          type: string
          format: uuid
        status:
          type: string
          enum: [queued]
        correlationId:
          type: string
          format: uuid

    OperationStatus:
      type: object
      required: [operationId, status]
      properties:
        operationId:
          type: string
          format: uuid
        status:
          type: string
          enum: [notStarted, running, succeeded, failed, cancelled]
        kind:
          type: string
          enum: [analysis, actionPreview, rollout, rollback]
        createdAt:
          type: string
          format: date-time
        lastUpdatedAt:
          type: string
          format: date-time
        resourceLocation:
          type: string
          format: uri
        error:
          type: object
          additionalProperties: true

    TimelineEvent:
      type: object
      required: [eventTime, eventType]
      properties:
        eventTime:
          type: string
          format: date-time
        eventType:
          type: string
        payload:
          type: object
          additionalProperties: true

    ProblemDetails:
      type: object
      required: [title, status]
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
          format: uri
        errorCode:
          type: string
        traceId:
          type: string
